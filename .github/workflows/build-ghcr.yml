name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ghcr-release
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          python <<'PY'
          import os
          import re
          import subprocess
          import sys

          event_name = os.environ["EVENT_NAME"]
          ref_name = os.environ.get("REF_NAME", "").strip()
          default_branch = os.environ.get("DEFAULT_BRANCH", "main").strip()
          pattern = re.compile(r"^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$")

          raw_tags = subprocess.check_output(
              ["git", "tag", "--list", "v*.*.*"],
              text=True,
          ).splitlines()

          versions = []
          for raw_tag in raw_tags:
              tag = raw_tag.strip()
              match = pattern.fullmatch(tag)
              if match:
                  versions.append((tuple(map(int, match.groups())), tag))

          versions.sort(key=lambda item: item[0])

          def fail(message: str) -> None:
              print(message)
              sys.exit(1)

          def write_output(tag: str) -> None:
              output_path = os.environ["GITHUB_OUTPUT"]
              with open(output_path, "a", encoding="utf-8") as fh:
                  fh.write(f"tag={tag}\n")

          if event_name == "workflow_dispatch":
              if ref_name != default_branch:
                  fail(f"Manual release must run from {default_branch}, current ref is {ref_name}.")

              if not versions:
                  tag = "v1.0.0"
              else:
                  (major, minor, patch), _ = versions[-1]
                  tag = f"v{major}.{minor}.{patch + 1}"

              print(f"Next release tag: {tag}")
              write_output(tag)
              sys.exit(0)

          if not pattern.fullmatch(ref_name):
              fail("Tag must match v<major>.<minor>.<patch>, for example v1.0.0")

          current_match = pattern.fullmatch(ref_name)
          assert current_match is not None
          current_version = tuple(map(int, current_match.groups()))
          previous_versions = [item for item in versions if item[1] != ref_name]

          if not previous_versions:
              if ref_name != "v1.0.0":
                  fail("The first release tag must be v1.0.0")
          else:
              (prev_major, prev_minor, prev_patch), prev_tag = previous_versions[-1]
              current_major, current_minor, current_patch = current_version

              if (current_major, current_minor) != (prev_major, prev_minor):
                  fail(
                      f"Only patch releases are allowed. Previous tag: {prev_tag}, current tag: {ref_name}"
                  )

              expected_patch = prev_patch + 1
              if current_patch != expected_patch:
                  fail(
                      f"Patch version must increase by exactly 1. Expected v{prev_major}.{prev_minor}.{expected_patch}, got {ref_name}"
                  )

          print(f"Validated release tag: {ref_name}")
          write_output(ref_name)
          PY

      - name: Create and push release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          export GIT_AUTHOR_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          export GIT_COMMITTER_NAME="github-actions[bot]"
          export GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
