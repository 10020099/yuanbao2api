name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"

          if [[ ! "$current_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v<major>.<minor>.<patch>, for example v1.0.0"
            exit 1
          fi

          mapfile -t previous_tags < <(
            git tag --list 'v*.*.*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -Fxv "$current_tag" \
              | sort -V
          )

          if [[ ${#previous_tags[@]} -eq 0 ]]; then
            if [[ "$current_tag" != "v1.0.0" ]]; then
              echo "The first release tag must be v1.0.0"
              exit 1
            fi
            exit 0
          fi

          previous_tag="${previous_tags[-1]}"
          current_version="${current_tag#v}"
          previous_version="${previous_tag#v}"

          IFS='.' read -r current_major current_minor current_patch <<< "$current_version"
          IFS='.' read -r previous_major previous_minor previous_patch <<< "$previous_version"

          if [[ "$current_major" -ne "$previous_major" || "$current_minor" -ne "$previous_minor" ]]; then
            echo "Only patch releases are allowed. Previous tag: $previous_tag, current tag: $current_tag"
            exit 1
          fi

          expected_patch=$((previous_patch + 1))
          if [[ "$current_patch" -ne "$expected_patch" ]]; then
            echo "Patch version must increase by exactly 1. Expected v${previous_major}.${previous_minor}.${expected_patch}, got $current_tag"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
